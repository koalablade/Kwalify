      <stop offset="0%" stop-color="#0d0b1e"/>
      <stop offset="100%" stop-color="#1a1230"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="80" y="80" width="88" height="88" rx="20" fill="#1DB954"/>
