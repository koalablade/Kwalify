# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting GitHub, use: New > Blueprint > select koalablade/Kwalify

databases:
  - name: kwalify-db
    plan: free
    region: frankfurt
    databaseName: kwalify
    user: kwalify

services:
  - type: web
    name: kwalify-api
    runtime: node
    plan: free
    region: frankfurt
    repo: https://github.com/koalablade/Kwalify
    branch: main
    buildCommand: |
      set -e
      npm ci --no-audit --prefer-offline --include=dev
      node -e "console.log('tsc exists:', require.resolve('typescript'))"
      test -f node_modules/.bin/tsc || (echo "tsc missing - install failed" && exit 1)
      npm run build
    startCommand: npm start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_CACHE
        value: /tmp/npm-cache
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NPM_CONFIG_PROGRESS
        value: "false"
      - key: NPM_CONFIG_FUND
        value: "false"
      - key: NPM_CONFIG_AUDIT
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: kwalify-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
