name: Uptime smoke

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci && npm run build
      - name: Production health + readyz
        env:
          SMOKE_BASE_URL: https://kwalify.net
          PLAYLIST_EVAL_TOKEN: ${{ secrets.PLAYLIST_EVAL_TOKEN }}
        run: npm run smoke:deploy
