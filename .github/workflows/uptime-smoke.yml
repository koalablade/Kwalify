name: Uptime smoke

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: ./.github/actions/benchmark-env
        with:
          playlist-eval-token: ${{ secrets.PLAYLIST_EVAL_TOKEN }}
          smoke-spotify-user-id: ${{ secrets.SMOKE_SPOTIFY_USER_ID }}
          base-url: https://kwalify.net
          require-secrets: "true"
      - run: npm ci && npm run build
      - name: Validate benchmark environment
        run: npm run validate:benchmark-env
      - name: Production health + readyz + eval token
        run: npm run smoke:deploy
