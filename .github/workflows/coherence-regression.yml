name: Coherence regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  coherence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Local coherence fixtures
        run: |
          npm run coherence:intent
          npm run coherence:playlist
          npm run coherence:world-boundary
          npm run coherence:uk-hip-hop
          npm run coherence:taxonomy
          npm run coherence:semantic-collisions
          npm run coherence:electronic-subgenres
      - name: Live coherence regression (PR only via CI workflow)
        if: false
