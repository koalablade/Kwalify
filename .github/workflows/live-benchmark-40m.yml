name: Live benchmark 40m

on:
  workflow_dispatch:

jobs:
  prompt-reliability-live:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: ./.github/actions/benchmark-env
        with:
          playlist-eval-token: ${{ secrets.PLAYLIST_EVAL_TOKEN }}
          smoke-spotify-user-id: ${{ secrets.SMOKE_SPOTIFY_USER_ID }}
          base-url: https://kwalify.net
          require-secrets: "true"
      - run: npm ci && npm run build
      - name: Validate benchmark environment
        run: npm run validate:benchmark-env
      - name: Verify eval token matches production
        run: npm run verify:eval-token
      - name: Live prompt reliability benchmark (~40m)
        run: |
          DEPLOYED_SHA=$(curl -fsS https://kwalify.net/api/readyz | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{const j=JSON.parse(s);process.stdout.write(String(j.commit||'unknown'))}catch{process.stdout.write('unknown')}})")
          SHORT_SHA=$(echo "$DEPLOYED_SHA" | cut -c1-12)
          OUT_DIR="reports/prompt-reliability/post-deploy/${SHORT_SHA}"
          echo "Deployed commit: $DEPLOYED_SHA"
          echo "Output dir: $OUT_DIR"
          npm run benchmark:prompt-reliability -- \
            --out "$OUT_DIR" \
            --baseline backend/data/post-deploy-baseline-84a9b93-prompt-reliability.json \
            --delay-ms 2000 \
            --timeout-ms 120000
          echo "OUT_DIR=$OUT_DIR" >> "$GITHUB_ENV"
      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prompt-reliability-live-${{ github.run_id }}
          path: reports/prompt-reliability/
          if-no-files-found: warn
