name: Live benchmark 40m

on:
  workflow_dispatch:

jobs:
  prompt-reliability-live:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: ./.github/actions/benchmark-env
        with:
          playlist-eval-token: ${{ secrets.PLAYLIST_EVAL_TOKEN }}
          smoke-spotify-user-id: ${{ secrets.SMOKE_SPOTIFY_USER_ID }}
          base-url: https://kwalify.net
          require-secrets: "true"
      - run: npm ci && npm run build
      - name: Validate benchmark environment
        run: npm run validate:benchmark-env
      - name: Live prompt reliability benchmark (~40m)
        run: |
          OUT_DIR="reports/prompt-reliability/live-$(date -u +%Y%m%dT%H%MZ)"
          npm run benchmark:prompt-reliability -- \
            --out "$OUT_DIR" \
            --delay-ms 2000 \
            --timeout-ms 120000
          echo "OUT_DIR=$OUT_DIR" >> "$GITHUB_ENV"
      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prompt-reliability-live-${{ github.run_id }}
          path: reports/prompt-reliability/
          if-no-files-found: warn
