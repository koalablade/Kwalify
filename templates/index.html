<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K_WALAH</title>

  <style>
    body{
      background:#0b0b0b;
      color:white;
      font-family:Arial;
      margin:0;
      padding:40px;
    }

    .card{
      background:#151515;
      border-radius:20px;
      padding:24px;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:none;
      margin-top:12px;
      background:#222;
      color:white;
    }

    button{
      margin-top:14px;
      padding:14px 22px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background:#1db954;
      color:white;
      font-weight:bold;
    }

    .track{
      padding:12px;
      border-bottom:1px solid #333;
    }

    a{
      color:#1db954;
    }
  </style>
</head>
<body>

{% if logged_in %}

<div class="card">
  <h1>K_WALAH AI DJ</h1>

  <input
    id="vibeInput"
    placeholder="night drive in tokyo rain"
  />

  <button onclick="generatePlaylist()">
    Generate Playlist
  </button>
</div>

<div class="card" id="resultCard" style="display:none">
  <h2 id="playlistTitle"></h2>

  <p>
    <a id="playlistLink" target="_blank">
      Open Playlist
    </a>
  </p>

  <div id="tracks"></div>
</div>

{% else %}

<div class="card">
  <h1>K_WALAH</h1>

  <p>
    AI playlist generation powered by your Spotify library.
  </p>

  <a href="/login">
    <button>
      Connect Spotify
    </button>
  </a>
</div>

{% endif %}

<script>
async function generatePlaylist(){

  const vibe =
    document.getElementById("vibeInput").value;

  const response = await fetch("/generate",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      vibe:vibe,
      mode:"balanced",
      length:25
    })
  });

  const data = await response.json();

  document.getElementById("resultCard").style.display="block";

  document.getElementById("playlistTitle").innerText =
    "K_WALAH • " + vibe;

  document.getElementById("playlistLink").href =
    data.url;

  const tracksDiv =
    document.getElementById("tracks");

  tracksDiv.innerHTML = "";

  data.tracks.forEach(track => {

    tracksDiv.innerHTML += `
      <div class="track">
        <strong>${track.name}</strong><br>
        ${track.artist}
      </div>
    `;
  });
}
</script>

</body>
</html>
