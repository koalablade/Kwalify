kind = "web"
previewPath = "/"
title = "Kwalify"
version = "1.0.0"
id = "artifacts/kwalify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23915

[services.development]
run = "pnpm --filter @workspace/kwalify run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kwalify", "run", "build" ]
publicDir = "artifacts/kwalify/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23915"
BASE_PATH = "/"
