<!DOCTYPE html>
<html lang="en" data-kw="loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kwalify</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a5080" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { min-height:100%; }
    body {
      font-family:'Nunito', system-ui, -apple-system, Segoe UI, sans-serif;
      background:#081522; color:#fff; overflow-x:hidden;
    }
    button, input { font:inherit; }
    .kw-boot {
      position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
      background:#081522;
    }
    .kw-boot-line {
      width:min(120px,32vw); height:3px; border-radius:999px; overflow:hidden;
      background:rgba(255,255,255,.1);
    }
    .kw-boot-line::after {
      content:''; display:block; width:45%; height:100%; border-radius:inherit;
      background:#1ed760; animation:kwBoot 1s ease-in-out infinite alternate;
    }
    @keyframes kwBoot { from { transform:translateX(-20%); } to { transform:translateX(170%); } }
    html[data-kw="guest"] .kw-boot,
    html[data-kw="app"] .kw-boot { display:none; }

    .kw-landing {
      min-height:100vh; display:none; align-items:center; justify-content:center; text-align:center;
      padding:48px 24px; background:#9dbfd0; color:#0a0a0a;
    }
    html[data-kw="guest"] .kw-landing { display:flex; }
    .kw-landing-card { max-width:520px; }
    .kw-landing h1 { font-size:clamp(56px,12vw,104px); line-height:.9; letter-spacing:-.06em; margin-bottom:20px; }
    .kw-landing p { font-size:18px; font-weight:700; margin-bottom:28px; }
    .kw-login {
      display:inline-flex; align-items:center; justify-content:center; min-width:176px;
      padding:15px 28px; border-radius:999px; text-decoration:none; color:#fff; background:#121212;
      font-weight:800;
    }

    .kw-shell { display:none; min-height:100vh; position:relative; background:#081522; }
    html[data-kw="app"] .kw-shell { display:block; }
    .kw-logout {
      position:absolute; top:20px; right:20px; z-index:4; border:0; border-radius:999px;
      padding:9px 14px; background:rgba(255,255,255,.08); color:rgba(255,255,255,.7);
      cursor:pointer; font-size:12px; font-weight:700;
    }
    .kw-home {
      min-height:100vh; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:32px; padding:88px 28px 52px;
      background:radial-gradient(ellipse 88% 68% at 48% 38%, #245f88 0%, #163d5c 46%, #081522 100%);
    }
    .kw-compose {
      width:min(560px,100%); padding:18px; border-radius:20px;
      background:rgba(8,21,34,.76); border:1px solid rgba(255,255,255,.12);
      box-shadow:0 14px 34px rgba(0,0,0,.2);
    }
    .kw-label {
      display:block; margin-bottom:10px; font-size:11px; font-weight:800; letter-spacing:.08em;
      text-transform:uppercase; color:rgba(255,255,255,.48);
    }
    .kw-input-row { display:flex; gap:8px; }
    .kw-input-wrap { flex:1; min-width:0; position:relative; }
    .kw-input {
      width:100%; border:1px solid rgba(255,255,255,.14); border-radius:12px;
      padding:14px 54px 14px 16px; background:rgba(0,0,0,.22); color:#fff; outline:none;
      font-size:16px;
    }
    .kw-input:focus { border-color:rgba(30,215,96,.5); }
    .kw-counter {
      position:absolute; right:12px; bottom:11px; font-size:11px; color:rgba(255,255,255,.3);
      pointer-events:none;
    }
    .kw-generate {
      min-width:148px; border:0; border-radius:12px; padding:0 18px;
      background:#1ed760; color:#061008; font-weight:900; cursor:pointer;
    }
    .kw-generate:disabled { opacity:.65; cursor:wait; }
    .kw-grid {
      width:100%; max-width:1000px; display:grid; grid-template-columns:repeat(3,minmax(0,1fr));
      gap:24px;
    }
    .kw-card {
      min-height:160px; border:0; border-radius:30px; padding:26px;
      background:linear-gradient(168deg, rgba(39,121,167,.42), rgba(255,255,255,.1) 42%, rgba(8,24,40,.35));
      color:rgba(255,255,255,.72); cursor:pointer; box-shadow:0 8px 28px rgba(0,0,0,.12);
      transition:transform .25s ease, box-shadow .25s ease;
    }
    .kw-card:hover { transform:translateY(-5px); box-shadow:0 16px 36px rgba(0,0,0,.16), 0 0 34px rgba(30,215,96,.14); }
    .kw-card-title { font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    .kw-toast-stack { position:fixed; right:16px; bottom:16px; z-index:20; display:grid; gap:8px; }
    .kw-toast {
      max-width:320px; padding:12px 14px; border-radius:12px; background:rgba(0,0,0,.82);
      color:#fff; font-size:14px;
    }
    @media (max-width:720px) {
      .kw-grid { grid-template-columns:1fr; max-width:340px; }
      .kw-input-row { flex-direction:column; }
      .kw-generate { min-height:48px; }
    }
  </style>
</head>
<body>
  <div id="bootSplash" class="kw-boot" aria-live="polite" aria-busy="true">
    <div class="kw-boot-line" aria-hidden="true"></div>
  </div>

  <main id="landingView" class="kw-landing">
    <section class="kw-landing-card">
      <h1>Kwalify</h1>
      <p>Get a playlist for your mood based on music you love.</p>
      <a class="kw-login" href="/api/auth/login">Let's go</a>
    </section>
  </main>

  <main id="appView" class="kw-shell" hidden>
    <button type="button" id="logoutBtn" class="kw-logout">Log out</button>
    <section class="kw-home" aria-label="Emotion grid">
      <form id="generateForm" class="kw-compose">
        <label class="kw-label" for="vibeInput">Describe a moment</label>
        <div class="kw-input-row">
          <span class="kw-input-wrap">
            <input id="vibeInput" class="kw-input" type="text" maxlength="140" autocomplete="off" placeholder="petrol station 2am" />
            <span id="vibeCounter" class="kw-counter">0/140</span>
          </span>
          <button id="generateBtn" class="kw-generate" type="submit">Make playlist</button>
        </div>
      </form>
      <div id="emotionMoodGrid" class="kw-grid" role="list"></div>
    </section>
  </main>

  <div id="toastStack" class="kw-toast-stack"></div>

  <script src="/js/emotion-ui.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    function setView(view) {
      document.documentElement.dataset.kw = view;
      const boot = $('bootSplash');
      if (boot) boot.setAttribute('aria-busy', view === 'loading' ? 'true' : 'false');
    }

    function showToast(message) {
      const stack = $('toastStack');
      if (!stack) return;
      const toast = document.createElement('div');
      toast.className = 'kw-toast';
      toast.textContent = message;
      stack.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    async function api(path, options = {}) {
      const response = await fetch('/api' + path, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      return { ok: response.ok, status: response.status, data: await response.json().catch(() => ({})) };
    }

    function showLanding() {
      const app = $('appView');
      if (app) {
        app.hidden = true;
        app.setAttribute('hidden', '');
      }
      setView('guest');
    }

    function showApp() {
      const app = $('appView');
      if (app) {
        app.hidden = false;
        app.removeAttribute('hidden');
      }
      if (typeof renderEmotionGrid === 'function') renderEmotionGrid();
      setView('app');
    }

    async function generatePlaylist(vibe) {
      const button = $('generateBtn');
      if (button) {
        button.disabled = true;
        button.textContent = 'Making...';
      }
      try {
        const result = await fetch('/api/generate', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vibe, length: 25, mode: 'balanced' }),
        });
        const data = await result.json().catch(() => ({}));
        if (result.status === 401) {
          location.href = '/api/auth/login';
          return;
        }
        if (!result.ok || data.error) {
          showToast(data.error || 'Could not make playlist.');
          return;
        }
        if (data.spotifyPlaylistUrl) {
          location.href = data.spotifyPlaylistUrl;
          return;
        }
        showToast('Playlist created.');
      } catch {
        showToast('Connection failed. Try again.');
      } finally {
        if (button) {
          button.disabled = false;
          button.textContent = 'Make playlist';
        }
      }
    }

    async function init() {
      setView('loading');
      try {
        const auth = await api('/auth/me');
        if (auth.ok) showApp();
        else showLanding();
      } catch {
        showLanding();
      }
    }

    $('generateForm')?.addEventListener('submit', (event) => {
      event.preventDefault();
      const input = $('vibeInput');
      const vibe = (input?.value || '').trim();
      if (!vibe) {
        input?.focus();
        showToast('Type a moment first.');
        return;
      }
      generatePlaylist(vibe);
    });

    $('vibeInput')?.addEventListener('input', () => {
      const input = $('vibeInput');
      const counter = $('vibeCounter');
      if (counter) counter.textContent = `${(input?.value || '').length}/140`;
    });

    $('logoutBtn')?.addEventListener('click', async () => {
      await api('/auth/logout', { method: 'POST' });
      location.reload();
    });

    init();
  </script>
</body>
</html>
