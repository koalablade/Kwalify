<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Playlist Gallery — Kwalify</title>
  <meta name="theme-color" content="#090910" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #060608;
      --surface:      rgba(255,255,255,0.04);
      --surface-hi:   rgba(255,255,255,0.07);
      --border:       rgba(255,255,255,0.08);
      --border-hi:    rgba(255,255,255,0.14);
      --green:        #1db954;
      --green-dim:    rgba(29,185,84,0.12);
      --green-glow:   rgba(29,185,84,0.28);
      --purple:       #8250ff;
      --purple-dim:   rgba(130,80,255,0.12);
      --purple-mid:   rgba(130,80,255,0.2);
      --purple-glow:  rgba(130,80,255,0.28);
      --text:         #ffffff;
      --text-sub:     rgba(255,255,255,0.58);
      --text-muted:   rgba(255,255,255,0.33);
      --text-faint:   rgba(255,255,255,0.18);
      --r:            14px;
      --r-sm:         10px;
      --r-pill:       9999px;
      --spring:       cubic-bezier(0.16,1,0.3,1);
    }
    html, body { min-height: 100%; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); animation: drift 22s ease-out infinite alternate; }
    .orb-1 { display:none; }
    .orb-2 { width:520px;height:520px;bottom:-100px;right:-80px; background:radial-gradient(circle,rgba(29,185,84,.11),transparent 70%); animation-duration:20s;animation-delay:-10s; }
    @keyframes drift { 0%{transform:translate(0,0)} 50%{transform:translate(20px,-16px)} 100%{transform:translate(-12px,22px)} }

    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 16px 80px; }
    .inner { width: 100%; max-width: 960px; }

    .header { width: 100%; max-width: 960px; display: flex; align-items: center; justify-content: space-between; padding: 22px 0 0; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-mark { width: 33px; height: 33px; background: linear-gradient(145deg,#128b3f,#1db954); border-radius: 9px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 14px var(--green-glow); }
    .logo-mark svg { display: block; }
    .logo-name { font-size: 15px; font-weight: 800; letter-spacing: -.3px; color: var(--text); }
    .logo-name em { color: var(--green); font-style: normal; }
    .back-link { font-size: 13px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 5px; transition: color .15s; }
    .back-link:hover { color: var(--text-sub); }

    .page-heading { margin-top: 40px; margin-bottom: 28px; }
    .page-heading h1 { font-size: clamp(28px,5vw,40px); font-weight: 900; letter-spacing: -1px; margin-bottom: 6px; }
    .page-heading p { font-size: 14px; color: var(--text-muted); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

    .pl-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); overflow: hidden; cursor: pointer; transition: border-color .18s, box-shadow .18s, transform .15s var(--spring); animation: fsu .35s var(--spring) both; }
    .pl-card:hover { border-color: var(--border-hi); box-shadow: 0 8px 32px rgba(0,0,0,.3); transform: translateY(-2px); }
    @keyframes fsu { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    .card-art-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; aspect-ratio: 2/1; background: var(--purple-dim); border-radius: 0; overflow: hidden; border-bottom: 1px solid var(--border); }
    .card-art-grid img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-art-grid .art-fb { background: var(--purple-dim); display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .card-art-single { aspect-ratio: 2/1; background: var(--purple-dim); border-bottom: 1px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 36px; }
    .card-art-single img { width: 100%; height: 100%; object-fit: cover; }

    .card-body { padding: 14px 16px 12px; }
    .card-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .card-vibe { font-size: 12px; color: var(--text-sub); font-style: italic; line-height: 1.45; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { font-size: 11px; color: var(--text-muted); }
    .card-mood-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
    .card-mood { font-size: 10px; padding: 2px 8px; border-radius: var(--r-pill); background: var(--green-dim); border: 1px solid rgba(29,185,84,.25); color: #8fe8b0; font-weight: 600; }
    .featured-vibes { margin-bottom: 28px; }
    .featured-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
    .featured-list { display: flex; flex-direction: column; gap: 8px; }
    .featured-item { font-size: 13px; color: var(--text-sub); font-style: italic; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; line-height: 1.45; }

    .card-actions { display: flex; align-items: center; gap: 7px; padding: 10px 16px 14px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; font-family: inherit; font-weight: 600; cursor: pointer; text-decoration: none; white-space: nowrap; transition: background .15s, color .15s, border-color .15s; }
    .btn-spotify { background: var(--green-dim); color: var(--green); border: 1px solid rgba(29,185,84,.28); border-radius: var(--r-pill); padding: 5px 12px; font-size: 11.5px; }
    .btn-spotify:hover { background: rgba(29,185,84,.2); }
    .btn-share { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--r-pill); padding: 5px 12px; font-size: 11.5px; }
    .btn-share:hover { background: var(--surface-hi); color: var(--text-sub); border-color: var(--border-hi); }

    .empty-state { text-align: center; padding: 64px 20px; }
    .empty-icon { font-size: 52px; margin-bottom: 18px; }
    .empty-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .empty-body { font-size: 14px; color: var(--text-sub); max-width: 360px; margin: 0 auto 28px; line-height: 1.65; }
    .btn-cta { background: var(--green); color: #000; font-weight: 700; border-radius: var(--r-pill); padding: 13px 28px; font-size: 14px; box-shadow: 0 4px 18px var(--green-glow); text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
    .btn-cta:hover { transform: translateY(-1px); box-shadow: 0 8px 28px var(--green-glow); }

    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 48px 32px; text-align: center; margin-top: 60px; }
    .login-icon { font-size: 48px; margin-bottom: 18px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .login-body { font-size: 14px; color: var(--text-sub); margin-bottom: 28px; line-height: 1.6; }

    .spin { width: 28px; height: 28px; border: 2.5px solid rgba(255,255,255,.12); border-top-color: var(--purple); border-radius: 50%; animation: spin .65s linear infinite; margin: 70px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast-stack { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column-reverse; gap: 8px; z-index: 200; pointer-events: none; }
    .toast { display: flex; align-items: center; gap: 10px; padding: 12px 18px; border-radius: 12px; font-size: 13.5px; font-weight: 500; max-width: 340px; pointer-events: all; backdrop-filter: blur(16px); animation: tin .3s var(--spring) forwards; box-shadow: 0 8px 32px rgba(0,0,0,.45); }
    @keyframes tin { from{opacity:0;transform:translateX(20px) scale(.95)} to{opacity:1;transform:none} }
    .toast-out { animation: tout .25s ease-out forwards; }
    @keyframes tout { to{opacity:0;transform:translateX(20px) scale(.9)} }
    .toast-success { background: rgba(4,20,10,.93); border: 1px solid rgba(29,185,84,.28); color: #5edf8a; }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>
<div class="toast-stack" id="toastStack"></div>

<div class="page">
  <header class="header">
    <a class="logo" href="/">
      <div class="logo-mark" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 4h5.2l2.8 5.2L17 4H22l-7.5 9.8V20h-5.1v-6.2L6 4z" fill="#fff"/></svg></div>
      <span class="logo-name">K<em>walify</em></span>
    </a>
    <a href="/" class="back-link">← Back to app</a>
  </header>

  <div class="inner">
    <div class="page-heading">
      <h1>Recently generated vibes</h1>
      <p>Moments people turned into playlists — only songs they already loved on Spotify</p>
    </div>
    <div id="main"><div class="spin"></div></div>
  </div>
</div>

<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const ARC_LABELS={slow_burn:'Slow burn',linear_rise:'Steady lift',recovery:'Recovery',peak_release:'Build & release',wave:'Ebb & flow',default:'Balanced'};

function moodTags(ep){
  if(!ep||typeof ep!=='object') return [];
  const tags=[];
  if(ep.timeOfDay) tags.push(String(ep.timeOfDay).replace(/_/g,' '));
  if(ep.environment) tags.push(String(ep.environment).replace(/_/g,' '));
  if(ep.journeyArc) tags.push(ARC_LABELS[ep.journeyArc]||ep.journeyArc);
  if(ep.nostalgia>=0.55) tags.push('nostalgic');
  if(ep.calm>=0.6) tags.push('calm');
  return tags.slice(0,4);
}

function showToast(msg, type='success', ms=2500){
  const stack=document.getElementById('toastStack'); if(!stack) return;
  const t=document.createElement('div'); t.className=`toast toast-${type}`;
  t.innerHTML=`<span>✓</span><span>${msg}</span>`;
  stack.appendChild(t);
  const rm=()=>{ t.classList.add('toast-out'); setTimeout(()=>t.remove(),280); };
  setTimeout(rm,ms); t.addEventListener('click',rm);
}

function sharePlaylist(id, e){
  e.stopPropagation();
  const url = window.location.origin + '/p/' + id;
  navigator.clipboard?.writeText(url).then(()=>showToast('Link copied!')).catch(()=>{
    const ta=Object.assign(document.createElement('textarea'),{value:url,style:'position:fixed;opacity:0'});
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Link copied!');
  });
}

function buildArtGrid(tracks){
  const arts = tracks.slice(0,4).map(t => t.albumArt || t.album_art || '').filter(Boolean);
  if(arts.length >= 2){
    const cells = arts.slice(0,4).map(src=>`<img src="${esc(src)}" alt="" onerror="this.parentNode.innerHTML='<div class=art-fb>🎵</div>'">`).join('');
    return `<div class="card-art-grid">${cells}</div>`;
  }
  if(arts.length === 1){
    return `<div class="card-art-single"><img src="${esc(arts[0])}" alt="" onerror="this.outerHTML='🎵'"></div>`;
  }
  return `<div class="card-art-single">🎵</div>`;
}

function renderGallery(playlists){
  const main = document.getElementById('main');
  if(!playlists.length){
    main.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎵</div>
      <div class="empty-title">No playlists yet</div>
      <div class="empty-body">Generate your first playlist from the app — it will appear here.</div>
      <a href="/" class="btn-cta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Generate a playlist
      </a>
    </div>`;
    return;
  }

  const cards = playlists.map((p, idx) => {
    const tracks = Array.isArray(p.tracks) ? p.tracks : [];
    const count = tracks.length;
    const date = p.createdAt ? new Date(p.createdAt).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}) : '';
    const tags=moodTags(p.emotionProfile);
    const moodHtml=tags.length?`<div class="card-mood-row">${tags.map(t=>`<span class="card-mood">${esc(t)}</span>`).join('')}</div>`:'';
    const vibeHtml = p.vibe ? `<div class="card-vibe">"${esc(p.vibe)}"</div>` : '';
    const meta = [count+' track'+(count!==1?'s':''), date].filter(Boolean).join(' · ');
    const spotifyBtn = p.spotifyUrl
      ? `<a class="btn btn-spotify" href="${esc(p.spotifyUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ Spotify</a>`
      : '';
    return `<div class="pl-card" style="animation-delay:${idx*.05}s" onclick="window.location='/p/${p.id}'">
      ${buildArtGrid(tracks)}
      <div class="card-body">
        <div class="card-name">${esc(p.name)}</div>
        ${moodHtml}
        ${vibeHtml}
        <div class="card-meta">${esc(meta)}</div>
      </div>
      <div class="card-actions">
        ${spotifyBtn}
        <button class="btn btn-share" onclick="sharePlaylist(${p.id}, event)">🔗 Share</button>
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `<div class="grid">${cards}</div>`;
}

function renderLogin(){
  document.getElementById('main').innerHTML = `<div class="login-card">
    <div class="login-icon">🎧</div>
    <div class="login-title">Log in to see your gallery</div>
    <div class="login-body">Connect your Spotify account to view all the playlists you've generated with Kwalify.</div>
    <a href="/api/auth/login" class="btn-cta">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      Log in with Spotify
    </a>
  </div>`;
}

async function load(){
  try {
    const res = await fetch('/api/playlists', {credentials:'include'});
    if(res.status === 401){ renderLogin(); return; }
    if(!res.ok){ throw new Error('Server error'); }
    const data = await res.json();
    renderGallery(Array.isArray(data.playlists) ? data.playlists : []);
  } catch {
    document.getElementById('main').innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">Could not load gallery</div>
      <div class="empty-body">Something went wrong. Please try refreshing the page.</div>
      <a href="/" class="btn-cta" style="background:rgba(255,255,255,.08);color:var(--text-sub);box-shadow:none;border:1px solid var(--border);">← Back to app</a>
    </div>`;
  }
}

load();
</script>
</body>
</html>
