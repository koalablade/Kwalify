openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: K_WALAH Emotional AI Spotify DJ API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Spotify authentication
  - name: spotify
    description: Spotify library operations
  - name: generate
    description: Playlist generation
  - name: history
    description: Playlist history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    get:
      operationId: authLogin
      tags: [auth]
      summary: Redirect to Spotify OAuth
      responses:
        "302":
          description: Redirect to Spotify

  /auth/callback:
    get:
      operationId: authCallback
      tags: [auth]
      summary: Spotify OAuth callback
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: error
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirect to app

  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpotifyUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /spotify/cache-status:
    get:
      operationId: getCacheStatus
      tags: [spotify]
      summary: Get liked songs cache status
      responses:
        "200":
          description: Cache status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheStatus"

  /spotify/sync:
    post:
      operationId: syncLikedSongs
      tags: [spotify]
      summary: Trigger sync of liked songs
      responses:
        "200":
          description: Sync started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"

  /generate:
    post:
      operationId: generatePlaylist
      tags: [generate]
      summary: Generate emotional playlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistRequest"
      responses:
        "200":
          description: Generated playlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /history:
    get:
      operationId: getHistory
      tags: [history]
      summary: Get generated playlist history
      responses:
        "200":
          description: Playlist history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlaylistHistoryItem"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SpotifyUser:
      type: object
      required: [id, displayName]
      properties:
        id:
          type: string
        displayName:
          type: string
        email:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        country:
          type: ["string", "null"]

    CacheStatus:
      type: object
      required: [synced, totalTracks, lastSyncedAt, isSyncing]
      properties:
        synced:
          type: boolean
        totalTracks:
          type: integer
        lastSyncedAt:
          type: ["string", "null"]
        isSyncing:
          type: boolean
        syncProgress:
          type: ["integer", "null"]
        syncTotal:
          type: ["integer", "null"]

    SyncResponse:
      type: object
      required: [message, started]
      properties:
        message:
          type: string
        started:
          type: boolean

    PlaylistRequest:
      type: object
      required: [vibe]
      properties:
        vibe:
          type: string
          minLength: 1
        mode:
          type: string
          enum: [strict, balanced, chaotic]
          default: balanced
        length:
          type: integer
          minimum: 10
          maximum: 100
          default: 25

    EmotionProfile:
      type: object
      required: [energy, valence, tension, nostalgia, calm]
      properties:
        energy:
          type: number
        valence:
          type: number
        tension:
          type: number
        nostalgia:
          type: number
        calm:
          type: number
        environment:
          type: ["string", "null"]
        timeOfDay:
          type: ["string", "null"]
        motionState:
          type: ["string", "null"]

    PlaylistTrack:
      type: object
      required: [id, name, artist, album]
      properties:
        id:
          type: string
        name:
          type: string
        artist:
          type: string
        album:
          type: string
        albumArt:
          type: ["string", "null"]
        durationMs:
          type: integer
        energy:
          type: ["number", "null"]
        valence:
          type: ["number", "null"]
        tempo:
          type: ["number", "null"]
        score:
          type: number

    PlaylistResult:
      type: object
      required: [playlistId, playlistUrl, name, tracks, emotionProfile, mode, vibe]
      properties:
        playlistId:
          type: string
        playlistUrl:
          type: string
        name:
          type: string
        vibe:
          type: string
        mode:
          type: string
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/PlaylistTrack"
        emotionProfile:
          $ref: "#/components/schemas/EmotionProfile"
        totalTracks:
          type: integer

    PlaylistHistoryItem:
      type: object
      required: [id, playlistId, playlistUrl, name, vibe, mode, createdAt, trackCount]
      properties:
        id:
          type: integer
        playlistId:
          type: string
        playlistUrl:
          type: string
        name:
          type: string
        vibe:
          type: string
        mode:
          type: string
        trackCount:
          type: integer
        createdAt:
          type: string
        emotionProfile:
          $ref: "#/components/schemas/EmotionProfile"
